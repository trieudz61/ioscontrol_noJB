<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>App List — IOSControl</title>
<style>
  :root { --bg:#0f0f1a; --surface:#1a1a2e; --surface2:#16213e; --accent:#6c63ff; --text:#e8e8f0; --subtext:#888899; --border:#2a2a3e; --green:#34d399; --red:#f87171; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,sans-serif; height:100dvh; display:flex; flex-direction:column; }
  .topbar { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
  .topbar h1 { font-size:15px; font-weight:600; color:#a78bfa; }
  .sep { flex:1; }
  .btn { padding:6px 12px; border-radius:8px; border:none; cursor:pointer; font-size:13px; font-weight:500; background:var(--accent); color:#fff; }
  .btn-sec { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-green { background:#1a3d2e; color:var(--green); border:1px solid #205a40; }
  .btn-red { background:#3d1a1a; color:var(--red); border:1px solid #5a2020; }
  .btn:active { opacity:0.7; }

  .toolbar { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--surface2); border-bottom:1px solid var(--border); flex-shrink:0; }
  #search { flex:1; background:var(--border); color:var(--text); border:none; border-radius:8px; padding:7px 12px; font-size:13px; }
  #search::placeholder { color:var(--subtext); }
  .count-badge { font-size:12px; color:var(--subtext); white-space:nowrap; }

  .list-wrap { flex:1; overflow-y:auto; }
  .app-item {
    display:flex; align-items:center; gap:12px; padding:10px 14px;
    border-bottom:1px solid var(--border); transition:background 0.1s; cursor:pointer;
  }
  .app-item:hover { background:var(--surface2); }
  .app-icon { width:40px; height:40px; border-radius:10px; background:linear-gradient(135deg,var(--surface2),var(--border)); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .app-info { flex:1; min-width:0; }
  .app-name { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .app-bid { font-size:11px; color:var(--subtext); font-family:monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .app-ver { font-size:10px; color:#555; }
  .app-actions { display:flex; gap:6px; flex-shrink:0; }
  .action-btn { padding:4px 10px; border-radius:6px; border:none; cursor:pointer; font-size:11px; font-weight:500; }

  .empty { text-align:center; padding:60px 20px; color:var(--subtext); }
  .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(108,99,255,0.95); color:#fff; padding:10px 20px; border-radius:10px; font-size:13px; pointer-events:none; opacity:0; transition:opacity 0.3s; z-index:999; }
  .toast.show { opacity:1; }

  ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>📱 App List</h1>
  <div class="sep"></div>
  <button class="btn" id="btn-refresh">🔄 Refresh</button>
</div>

<div class="toolbar">
  <input type="search" id="search" placeholder="🔍 Search app name or bundle ID…">
  <span class="count-badge" id="count-badge">Loading…</span>
</div>

<div class="list-wrap" id="list-wrap">
  <div class="empty"><div class="spinner"></div><p style="margin-top:12px">Loading apps…</p></div>
</div>

<div class="toast" id="toast"></div>

<script>
const PORT = location.port || 46952;
const API = `http://${location.hostname}:${PORT}`;
let allApps = [];

const ICONS = {
  'com.apple': '🍎', 'com.google': '🔵', 'com.facebook': '📘',
  'com.twitter': '🐦', 'com.instagram': '📷', 'com.tencent': '💬',
  'com.snapchat': '👻', 'com.spotify': '🎵', 'com.netflix': '📺',
  'com.microsoft': '🪟', 'default': '📱'
};

function iconForBID(bid) {
  for (const [prefix, icon] of Object.entries(ICONS)) {
    if (bid.toLowerCase().startsWith(prefix)) return icon;
  }
  return ICONS.default;
}

async function loadApps() {
  document.getElementById('list-wrap').innerHTML = '<div class="empty"><div class="spinner"></div><p style="margin-top:12px">Loading apps…</p></div>';
  document.getElementById('count-badge').textContent = 'Loading…';
  try {
    const r = await fetch(`${API}/api/app/list`);
    const j = await r.json();
    allApps = j.apps || [];
    renderList(allApps);
    document.getElementById('count-badge').textContent = `${allApps.length} apps`;
  } catch(e) {
    document.getElementById('list-wrap').innerHTML = `<div class="empty">❌ Daemon offline<br><small>Open app first to start daemon</small></div>`;
    document.getElementById('count-badge').textContent = 'Error';
  }
}

function renderList(apps) {
  const wrap = document.getElementById('list-wrap');
  if (!apps.length) {
    wrap.innerHTML = '<div class="empty">No apps found</div>';
    return;
  }
  wrap.innerHTML = '';
  apps.forEach(app => {
    const row = document.createElement('div');
    row.className = 'app-item';
    row.innerHTML = `
      <div class="app-icon">${iconForBID(app.bundleID)}</div>
      <div class="app-info">
        <div class="app-name">${escHtml(app.name || app.bundleID)}</div>
        <div class="app-bid">${escHtml(app.bundleID)}</div>
        <div class="app-ver">v${escHtml(app.version || '—')}</div>
      </div>
      <div class="app-actions">
        <button class="action-btn btn-green" data-bid="${escHtml(app.bundleID)}" data-action="launch">▶</button>
        <button class="action-btn btn-red" data-bid="${escHtml(app.bundleID)}" data-action="kill">⏹</button>
        <button class="action-btn" style="background:var(--surface2);color:var(--text);border:1px solid var(--border)" data-bid="${escHtml(app.bundleID)}" data-action="copy">📋</button>
      </div>`;
    wrap.appendChild(row);
  });

  wrap.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation();
      const bid = btn.dataset.bid;
      const action = btn.dataset.action;
      if (action === 'copy') {
        navigator.clipboard.writeText(bid).catch(()=>{});
        showToast(`Copied: ${bid}`);
      } else if (action === 'launch') {
        showToast(`🚀 Launching ${bid}…`);
        await fetch(`${API}/api/app/launch`, { method:'POST', body:JSON.stringify({bundleID:bid}), headers:{'Content-Type':'application/json'} });
      } else if (action === 'kill') {
        showToast(`⏹ Killing ${bid}…`);
        await fetch(`${API}/api/app/kill`, { method:'POST', body:JSON.stringify({bundleID:bid}), headers:{'Content-Type':'application/json'} });
      }
    });
  });
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  const filtered = q ? allApps.filter(a => a.name.toLowerCase().includes(q) || a.bundleID.toLowerCase().includes(q)) : allApps;
  document.getElementById('count-badge').textContent = `${filtered.length} / ${allApps.length}`;
  renderList(filtered);
});

document.getElementById('btn-refresh').addEventListener('click', loadApps);

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

loadApps();
</script>
</body>
</html>
