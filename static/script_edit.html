<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script Editor — IOSControl</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/lua/lua.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/search/search.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/search/searchcursor.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/dialog/dialog.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/dialog/dialog.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css" />
    <style>
      /* Autocomplete — full signatures, readable on dark UI */
      .CodeMirror-hints {
        font-family: var(--font-mono);
        font-size: 12px;
        max-width: min(560px, 94vw);
        background: #121826 !important;
        border: 1px solid rgba(0, 212, 255, 0.22) !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      }
      .CodeMirror-hint {
        color: #e8e8f0 !important;
        padding: 5px 10px !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }
      .CodeMirror-hint:last-child { border-bottom: none; }
      .CodeMirror-hint-select {
        background: rgba(0, 212, 255, 0.2) !important;
        color: #fff !important;
      }
      :root {
        --bg: #060a12;
        --surface: #0d1220;
        --surface2: #111828;
        --primary: #00d4ff;
        --primary-glow: rgba(0, 212, 255, 0.2);
        --secondary: #a855f7;
        --accent: #6c63ff;
        --accent2: #a78bfa;
        --green: #34d399;
        --red: #f87171;
        --yellow: #fbbf24;
        --text: #e8e8f0;
        --subtext: rgba(255,255,255,0.5);
        --border: rgba(255,255,255,0.07);
        --border-glass: rgba(255,255,255,0.12);
        --font-mono: "JetBrains Mono", "SF Mono", "Fira Code", "Cascadia Code", monospace;
        --font-ui: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-ui);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Top Bar ── */
      .topbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: var(--surface);
        border-bottom: 1px solid rgba(0, 212, 255, 0.08);
        flex-shrink: 0;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .topbar-brand {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .topbar-brand svg {
        width: 20px;
        height: 20px;
        color: var(--primary);
        filter: drop-shadow(0 0 6px var(--primary-glow));
      }
      .topbar h1 {
        font-size: 14px;
        font-weight: 600;
        color: var(--primary);
        letter-spacing: -0.3px;
      }
      .topbar .shortcut-hint {
        font-size: 11px;
        color: var(--subtext);
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .topbar .sep { flex: 1; }
      .btn {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 6px 12px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        font-family: var(--font-ui);
        transition: all 0.15s;
      }
      .btn:active { opacity: 0.75; transform: scale(0.97); }
      .btn svg { width: 14px; height: 14px; }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%);
        color: #fff;
        box-shadow: 0 4px 14px rgba(108, 99, 255, 0.3);
      }
      .btn-primary:hover { box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4); }
      .btn-secondary {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border-glass);
      }
      .btn-secondary:hover {
        background: rgba(0, 212, 255, 0.06);
        border-color: rgba(0, 212, 255, 0.2);
        color: var(--primary);
      }
      .btn-danger {
        background: rgba(248, 113, 113, 0.1);
        color: var(--red);
        border: 1px solid rgba(248, 113, 113, 0.2);
      }
      .btn-danger:hover { background: rgba(248, 113, 113, 0.15); }
      .btn-success {
        background: rgba(52, 211, 153, 0.1);
        color: var(--green);
        border: 1px solid rgba(52, 211, 153, 0.2);
      }
      .btn-success:hover { background: rgba(52, 211, 153, 0.15); }

      /* ── File Bar ── */
      .filebar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .filebar select {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border-glass);
        border-radius: 6px;
        padding: 5px 10px;
        font-size: 12px;
        font-family: var(--font-ui);
        flex: 1;
        cursor: pointer;
        outline: none;
        transition: border-color 0.15s;
      }
      .filebar select:focus {
        border-color: rgba(0, 212, 255, 0.3);
        box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.08);
      }
      .file-status {
        font-size: 11px;
        color: var(--subtext);
        white-space: nowrap;
      }
      .file-status.modified { color: var(--yellow); }
      .file-status.saved { color: var(--green); }

      /* ── Main Row ── */
      .main-row { display: flex; flex: 1; overflow: hidden; }

      /* ── Editor ── */
      .editor-col { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
      .editor-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
      .CodeMirror {
        height: 100% !important;
        font-size: 13.5px;
        line-height: 1.6;
        font-family: var(--font-mono);
        background: #050810 !important;
      }
      .CodeMirror-scroll { overflow-y: auto !important; }
      .CodeMirror-gutters {
        background: #050810 !important;
        border-right: 1px solid var(--border) !important;
        width: 48px !important;
        min-width: 48px !important;
      }
      .CodeMirror-linenumber {
        padding: 0 8px 0 4px !important;
        min-width: 36px !important;
        text-align: right;
        color: rgba(255,255,255,0.2) !important;
      }
      .CodeMirror-sizer { margin-left: 48px !important; }
      .CodeMirror pre.CodeMirror-line,
      .CodeMirror pre.CodeMirror-line-like { padding-left: 8px !important; }
      .CodeMirror-cursor { border-left-color: var(--primary) !important; }
      .CodeMirror-selectedtext { background: rgba(0, 212, 255, 0.12) !important; }
      .cm-s-dracula .CodeMirror-selected { background: rgba(0, 212, 255, 0.15) !important; }
      .CodeMirror-activeline-background {
        background: rgba(0, 212, 255, 0.04) !important;
      }

      /* ── Output Panel ── */
      .output-panel {
        height: 140px;
        background: #050810;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }
      .output-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 14px;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
      }
      .output-header span {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--subtext);
        letter-spacing: 0.5px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--subtext);
        flex-shrink: 0;
        transition: background 0.2s;
      }
      .status-dot.running {
        background: var(--green);
        box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
        animation: pulse-green 1s infinite;
      }
      .status-dot.error { background: var(--red); box-shadow: 0 0 8px rgba(248, 113, 113, 0.5); }
      @keyframes pulse-green {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .output-text {
        flex: 1;
        overflow-y: auto;
        padding: 8px 14px;
        font-family: var(--font-mono);
        font-size: 11.5px;
        line-height: 1.6;
        color: #8bc34a;
        white-space: pre-wrap;
        word-break: break-all;
        -webkit-user-select: text;
        user-select: text;
      }
      .output-text .err { color: var(--red); }
      .output-text .ok { color: var(--green); }

      /* ── Status Bar ── */
      .statusbar {
        display: flex;
        gap: 16px;
        padding: 4px 14px;
        background: linear-gradient(90deg, var(--accent) 0%, var(--secondary) 100%);
        font-size: 11px;
        color: rgba(255,255,255,0.8);
        flex-shrink: 0;
        font-family: var(--font-mono);
      }
      .statusbar span { display: flex; align-items: center; gap: 4px; }

      /* ── Kbd shortcut hint ── */
      kbd {
        background: rgba(0,0,0,0.3);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 3px;
        padding: 1px 5px;
        font-size: 10px;
        color: rgba(255,255,255,0.6);
        font-family: var(--font-mono);
      }

      /* ── File Panel (right sidebar) ── */
      .file-panel {
        width: 220px;
        background: var(--surface);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        overflow: hidden;
      }
      .file-panel.hidden { display: none; }
      .file-panel-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--primary);
        letter-spacing: 0.5px;
      }
      .file-panel-header .sep { flex: 1; }
      .file-panel-header svg { width: 13px; height: 13px; }
      .file-panel-list { flex: 1; overflow-y: auto; padding: 4px; }
      .fp-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 8px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.1s;
        color: var(--text);
      }
      .fp-item:hover { background: rgba(0, 212, 255, 0.06); }
      .fp-item.active {
        background: rgba(0, 212, 255, 0.1);
        color: var(--primary);
      }
      .fp-item svg { width: 14px; height: 14px; color: var(--subtext); flex-shrink: 0; }
      .fp-item.active svg { color: var(--primary); }
      .fp-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .fp-del {
        opacity: 0;
        font-size: 13px;
        color: var(--red);
        cursor: pointer;
        transition: opacity 0.1s;
        width: 14px;
        height: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .fp-item:hover .fp-del { opacity: 1; }
      .fp-empty {
        text-align: center;
        padding: 24px 12px;
        color: var(--subtext);
        font-size: 11px;
        line-height: 1.5;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 212, 255, 0.15);
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0, 212, 255, 0.3); }
      ::selection { background: rgba(0, 212, 255, 0.2); }
    </style>
  </head>
  <body>
    <!-- Top Bar -->
    <div class="topbar">
      <div class="topbar-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
        </svg>
        <h1>Script Editor</h1>
      </div>
      <div class="shortcut-hint">
        <kbd>Ctrl+S</kbd> Save &nbsp; <kbd>F5</kbd> Run &nbsp; <kbd>Ctrl+/</kbd> Comment
      </div>
      <div class="sep"></div>
      <button class="btn btn-secondary" id="btn-toggle-files" title="Toggle Files">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="18" height="18" x="3" y="3" rx="2"/>
          <path d="M3 9h18"/><path d="M9 21V9"/>
        </svg>
        Files
      </button>
      <button class="btn btn-danger" id="btn-stop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect width="14" height="14" x="5" y="5" rx="2"/>
        </svg>
        Stop
      </button>
      <button class="btn btn-primary" id="btn-run">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Run
      </button>
    </div>

    <!-- File Bar -->
    <div class="filebar">
      <select id="file-select">
        <option value="">Load script...</option>
      </select>
      <button class="btn btn-secondary" id="btn-save">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
          <path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/>
          <path d="M7 3v4a1 1 0 0 0 1 1h7"/>
        </svg>
        Save
      </button>
      <button class="btn btn-secondary" id="btn-new">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/><path d="M12 5v14"/>
        </svg>
        New
      </button>
      <span class="file-status" id="file-status">unsaved</span>
    </div>

    <!-- Main Row: Editor + File Panel -->
    <div class="main-row">
    <div class="editor-col">

    <!-- Editor -->
    <div class="editor-wrap">
      <textarea id="editor">
-- IOSControl Script Editor
-- Lua 5.4 · XXTouch compatible API

-- Example: tap center of screen
local w, h = screen.get_size()
touch.tap(w/2, h/2)
sys.log("Tapped center: " .. w .. "x" .. h)
</textarea>
    </div>

    <!-- Output Panel -->
    <div class="output-panel">
      <div class="output-header">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Idle</span>
        <div style="flex: 1"></div>
        <button class="btn btn-secondary" style="padding: 2px 8px; font-size: 11px" id="btn-clear-out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px">
            <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
          </svg>
          Clear
        </button>
      </div>
      <div class="output-text" id="output"></div>
    </div>

    <!-- Status Bar -->
    <div class="statusbar">
      <span id="sb-cursor">Ln 1, Col 1</span>
      <span id="sb-lines">Lines: 9</span>
      <span id="sb-mode">Lua 5.4</span>
      <span id="sb-file">untitled.lua</span>
    </div>
    </div> <!-- close editor-col -->

    <!-- File Panel (right sidebar) -->
    <div class="file-panel" id="file-panel">
      <div class="file-panel-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
          <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
        </svg>
        <span>Scripts</span>
        <div class="sep"></div>
        <button class="btn btn-secondary" style="padding:2px 8px;font-size:10px" id="btn-new-file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="M12 5v14"/>
          </svg>
        </button>
      </div>
      <div class="file-panel-list" id="file-panel-list">
        <div class="fp-empty">No scripts yet.<br/>Create or load one above.</div>
      </div>
    </div>
    </div> <!-- close main-row -->

    <script>
      var PORT = location.port || 46952;
      var API = "http://" + location.hostname + ":" + PORT;

      // SVG strings for icons
      var fileSVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>';
      var trashSVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>';

      // ── CodeMirror init ──
      var cm = CodeMirror.fromTextArea(document.getElementById("editor"), {
        mode: "lua",
        theme: "dracula",
        lineNumbers: true,
        matchBrackets: true,
        autoCloseBrackets: true,
        tabSize: 2,
        indentWithTabs: false,
        electricChars: true,
        extraKeys: {
          "Ctrl-S": function() { saveScript(); },
          F5: function() { runScript(); },
          "Ctrl-Enter": function() { runScript(); },
          "Ctrl-/": function(cm) { cm.execCommand("toggleComment"); },
          "Ctrl-F": "find",
          "Ctrl-H": "replace",
        },
      });

      var editorWrap = document.querySelector(".editor-wrap");
      var ro = new ResizeObserver(function() {
        cm.setSize("100%", editorWrap.offsetHeight);
      });
      ro.observe(editorWrap);

      cm.on("cursorActivity", function() {
        var c = cm.getCursor();
        document.getElementById("sb-cursor").textContent = "Ln " + (c.line + 1) + ", Col " + (c.ch + 1);
        document.getElementById("sb-lines").textContent = "Lines: " + cm.lineCount();
      });
      cm.on("change", function() {
        document.getElementById("file-status").textContent = "modified";
        document.getElementById("file-status").className = "file-status modified";
      });

      // ── Lua autocomplete (display = full sig from API docs; insert = name + () + cursor inside) ──

      // Plain keywords that just insert the word
      var LUA_KEYWORDS = [
        "if", "else", "elseif", "while", "for", "do", "end",
        "repeat", "until", "return", "break", "then", "function",
        "local", "in", "pairs", "ipairs", "table", "require",
        "and", "or", "not", "true", "false", "nil",
      ];

      // Snippets with placeholders
      var LUA_SNIPPETS = [
        { display: "if condition then end", insert: "if ${1:condition} then\n\t$0\nend", type: "keyword" },
        { display: "if condition then else end", insert: "if ${1:condition} then\n\t$0\nelse\nend", type: "keyword" },
        { display: "if elseif then end", insert: "if ${1:condition} then\n\t$0\nelseif ${2:condition} then\nend", type: "keyword" },
        { display: "while condition do end", insert: "while ${1:condition} do\n\t$0\nend", type: "keyword" },
        { display: "for i = start, end do end", insert: "for ${1:i} = ${2:1}, ${3:10} do\n\t$0\nend", type: "keyword" },
        { display: "for k, v in pairs(t) do end", insert: "for ${1:k}, ${2:v} in pairs(${3:t}) do\n\t$0\nend", type: "keyword" },
        { display: "for k, v in ipairs(t) do end", insert: "for ${1:k}, ${2:v} in ipairs(${3:t}) do\n\t$0\nend", type: "keyword" },
        { display: "repeat until", insert: "repeat\n\t$0\nuntil ${1:condition}", type: "keyword" },
        { display: "function name() end", insert: "function ${1:name}()\n\t$0\nend", type: "keyword" },
        { display: "local function name() end", insert: "local function ${1:name}()\n\t$0\nend", type: "keyword" },
        { display: "return", insert: "return $0", type: "keyword" },
        { display: "break", insert: "break", type: "keyword" },
        { display: "local t = {}", insert: "local ${1:t} = {}", type: "keyword" },
        { display: "table.insert(t, value)", insert: "table.insert(${1:t}, ${2:value})", type: "keyword" },
        { display: "table.remove(t, index)", insert: "table.remove(${1:t}, ${2:index})", type: "keyword" },
        { display: "table.concat(t, sep)", insert: "table.concat(${1:t}, ${2:\"\"})", type: "keyword" },
        { display: "table.sort(t)", insert: "table.sort(${1:t})", type: "keyword" },
        { display: "table.unpack(t)", insert: "table.unpack(${1:t})", type: "keyword" },
        { display: "table.pack(...)", insert: "table.pack(...)", type: "keyword" },
        { display: "require 'module'", insert: "require '${1:module}'", type: "keyword" },
        { display: "-- @param type desc", insert: "-- @param ${1:type} ${2:desc}", type: "comment" },
      ];

      var LUA_API = [
        "sys.log(message)", "sys.toast(message [, duration])", "sys.alert(message [, title])", "sys.msleep(ms)", "sys.sleep(seconds)",
        "sys.time()", "sys.date([format])", "sys.getenv(key)", "sys.home()", "sys.lock()",
        "touch.tap(x, y)", "touch.swipe(x1, y1, x2, y2 [, duration])", "touch.long_press(x, y [, duration])",
        "touch.down(x, y [, finger])", "touch.move(x, y [, finger])", "touch.up(x, y [, finger])",
        "touch.tap_image(path [, threshold [, timeout]])", "touch.tap_text(text [, timeout])",
        "screen.get_size()", "screen.get_color(x, y)", "screen.capture()", "screen.ocr()",
        "screen.find_color(r, g, b [, tolerance])", "screen.find_multi_color(r, g, b [, tolerance [, max]])",
        "screen.find_text(target [, timeout])", "screen.find_image(path [, threshold [, timeout]])",
        "app.launch(bundleID)", "app.kill(bundleID)", "app.is_running(bundleID)", "app.frontmost()", "app.list()",
        "key.press(name)", "key.down(name)", "key.up(name)", "key.input_text(text)",
        "clipboard.read()", "clipboard.write(text)",
        "json.encode(value)", "json.decode(str)", "base64.encode(data)", "base64.decode(str)",
        "re.match(str, pattern)", "re.gmatch(str, pattern)", "re.gsub(str, pattern, replacement)", "re.test(str, pattern)",
        "http.get(url [, headers])", "http.post(url, body [, content_type [, headers]])",
        "timer.sleep(ms)", "timer.now()",
        "file.read(path)", "file.write(path, content)", "file.append(path, content)", "file.clear(path)",
        "file.remove_first_line(path)", "file.remove_last_line(path)",
      ];

      // For backward compat
      var LUA_SIGS = LUA_API;

      function sigToInsertText(sig) {
        var o = sig.indexOf("(");
        if (o < 0) return sig;
        var c = sig.lastIndexOf(")");
        var inner = (c > o ? sig.slice(o + 1, c) : sig.slice(o + 1)).trim();
        if (inner === "") {
          if (c > o) return sig;
          return sig + ")";
        }
        return sig.slice(0, o + 1) + ")";
      }

      function cursorChAfterOpenParen(insertText) {
        var o = insertText.indexOf("(");
        if (o < 0) return insertText.length;
        return o + 1;
      }

      CodeMirror.registerHelper("hint", "lua", function(cm) {
        var cur = cm.getCursor();
        var line = cm.getLine(cur.line);
        var start = cur.ch;
        var word = line.slice(0, start);
        var token = word.split(/[\s,()\[\]{}]+/).pop() || "";
        var tlow = token.toLowerCase();
        var fromCh = start - token.length;

        // Keywords
        var keywordItems = LUA_KEYWORDS.filter(function(kw) {
          return kw.startsWith(tlow);
        }).map(function(displayText) {
          return {
            displayText: displayText,
            text: displayText,
            hint: function(cm, data, completion) {
              cm.replaceRange(completion.text, data.from, data.to, "complete");
              cm.setCursor(data.from.line, data.from.ch + completion.text.length);
            },
          };
        });

        // Snippets
        var snippetItems = LUA_SNIPPETS.filter(function(s) {
          return s.display.toLowerCase().startsWith(tlow);
        }).map(function(s) {
          return {
            displayText: "⤷ " + s.display,
            text: s.insert,
            hint: function(cm, data, completion) {
              cm.replaceRange(completion.text, data.from, data.to, "complete");
              var inserted = completion.text;
              var tabCount = (inserted.match(/\$\{[^}]+\}/g) || []).length;
              if (tabCount > 0) {
                var pos = cm.getCursor();
                var snippetState = { pos: 0, jumps: [] };
                for (var i = 0; i < inserted.length; i++) {
                  if (inserted[i] === '$' && inserted[i+1] === '{') {
                    var end = inserted.indexOf('}', i);
                    if (end > i) {
                      var ph = inserted.slice(i+2, end);
                      if (ph === '0') {
                        cm.setCursor(data.from.line, data.from.ch + i);
                        return;
                      }
                      i = end + 1;
                    }
                  }
                }
                var firstPlaceholder = inserted.indexOf('${');
                if (firstPlaceholder >= 0) {
                  var nextBrace = inserted.indexOf('}', firstPlaceholder);
                  var defaultVal = inserted.slice(firstPlaceholder+2, nextBrace);
                  cm.setCursor(data.from.line, data.from.ch + nextBrace + 1);
                  cm.setSelection(
                    CodeMirror.Pos(data.from.line, data.from.ch + firstPlaceholder),
                    CodeMirror.Pos(data.from.line, data.from.ch + nextBrace + 1)
                  );
                }
              }
            },
          };
        });

        // API functions
        var apiItems = LUA_API.filter(function(sig) {
          return sig.toLowerCase().startsWith(tlow);
        }).map(function(displayText) {
          var insertText = sigToInsertText(displayText);
          var cursorRel = cursorChAfterOpenParen(insertText);
          return {
            displayText: displayText,
            text: insertText,
            hint: function(cm, data, completion) {
              cm.replaceRange(completion.text, data.from, data.to, "complete");
              cm.setCursor(CodeMirror.Pos(data.from.line, data.from.ch + cursorRel));
            },
          };
        });

        var list = [].concat(keywordItems, snippetItems, apiItems);
        return {
          list: list,
          from: CodeMirror.Pos(cur.line, fromCh),
          to: CodeMirror.Pos(cur.line, start),
        };
      });
      var autocompleteEnabled = true;

      function setEditorMode(filename) {
        var isLua = !filename || !filename.endsWith(".txt");
        document.getElementById("sb-mode").textContent = isLua ? "Lua 5.4" : "Plain Text";
        autocompleteEnabled = isLua;
      }

      cm.on("inputRead", function(cm, change) {
        if (autocompleteEnabled && change.text[0] && /\w|\./.test(change.text[0])) {
          cm.showHint({ hint: CodeMirror.hint.lua, completeSingle: false });
        }
      });

      // ── File management ──
      var currentFile = "";

      async function loadFileList() {
        try {
          var r = await fetch(API + "/api/script/list");
          var j = await r.json();
          var sel = document.getElementById("file-select");
          sel.innerHTML = '<option value="">Load script...</option>';
          (j.scripts || []).forEach(function(name) {
            var o = document.createElement("option");
            o.value = name;
            o.textContent = name;
            sel.appendChild(o);
          });
        } catch (e) { console.error("loadFileList", e); }
      }

      document.getElementById("file-select").addEventListener("change", async function(e) {
        var name = e.target.value;
        if (!name) return;
        try {
          var r = await fetch(API + "/api/script/file?name=" + encodeURIComponent(name));
          var text = await r.text();
          cm.setValue(text);
          cm.clearHistory();
          currentFile = name;
          window.location.hash = encodeURIComponent(name);
          document.getElementById("sb-file").textContent = name;
          document.getElementById("file-status").textContent = "saved";
          document.getElementById("file-status").className = "file-status saved";
          setEditorMode(name);
        } catch (e) { appendOutput("Load failed: " + e.message, true); }
      });

      async function saveScript() {
        if (!currentFile) {
          var name = prompt("Save as (without .lua):");
          if (!name) return;
          currentFile = name.endsWith(".lua") ? name : name + ".lua";
          document.getElementById("sb-file").textContent = currentFile;
          setEditorMode(currentFile);
        }
        try {
          await fetch(API + "/api/script/file?name=" + encodeURIComponent(currentFile), {
            method: "PUT",
            body: cm.getValue(),
            headers: { "Content-Type": "text/plain" },
          });
          document.getElementById("file-status").textContent = "saved";
          document.getElementById("file-status").className = "file-status saved";
          await loadFileList();
        } catch (e) { appendOutput("Save failed: " + e.message, true); }
      }

      document.getElementById("btn-save").addEventListener("click", saveScript);
      document.getElementById("btn-new").addEventListener("click", function() {
        currentFile = "";
        cm.setValue("-- New Script\n\n");
        document.getElementById("sb-file").textContent = "untitled.lua";
        document.getElementById("file-status").textContent = "unsaved";
        document.getElementById("file-status").className = "file-status";
        setEditorMode("");
        cm.focus();
      });

      // ── Script execution ──
      var statusPoll;

      function runScript() {
        var code = cm.getValue();
        setStatus("running");
        appendOutput("> Running...\n");
        fetch(API + "/api/script/run", {
          method: "POST",
          body: code,
          headers: { "Content-Type": "text/plain" },
        }).then(function() {
          statusPoll = setInterval(pollStatus, 500);
        }).catch(function(e) {
          appendOutput("Error: " + e.message + "\n", true);
          setStatus("idle");
        });
      }

      async function pollStatus() {
        try {
          var r = await fetch(API + "/api/script/status");
          var j = await r.json();
          if (j.status !== "running") {
            clearInterval(statusPoll);
            setStatus(j.status === "error" ? "error" : "idle");
            if (j.error) appendOutput("Error: " + j.error + "\n", true);
            else if (j.status === "idle") appendOutput("Completed\n", false, true);
          }
          var lr = await fetch(API + "/api/system/log");
          var lt = await lr.text();
          var luaLines = lt.split("\n").filter(function(l) { return l.indexOf("[Lua]") !== -1; }).slice(-5);
          if (luaLines.length) {
            var out = document.getElementById("output");
            var last = out.dataset.lastLog || "";
            var newLines = luaLines.filter(function(l) { return last.indexOf(l) === -1; });
            if (newLines.length) {
              appendOutput(newLines.join("\n") + "\n");
              out.dataset.lastLog = luaLines.join("\n");
            }
          }
        } catch (e) {
          clearInterval(statusPoll);
          setStatus("idle");
        }
      }

      document.getElementById("btn-run").addEventListener("click", runScript);
      document.getElementById("btn-stop").addEventListener("click", async function() {
        await fetch(API + "/api/script/stop", { method: "POST" });
        clearInterval(statusPoll);
        setStatus("idle");
        appendOutput("Stopped\n");
      });
      document.getElementById("btn-clear-out").addEventListener("click", function() {
        var out = document.getElementById("output");
        out.textContent = "";
        out.dataset.lastLog = "";
      });

      function setStatus(s) {
        var dot = document.getElementById("status-dot");
        var txt = document.getElementById("status-text");
        dot.className = "status-dot" + (s === "running" ? " running" : s === "error" ? " error" : "");
        txt.textContent = s.charAt(0).toUpperCase() + s.slice(1);
      }
      function appendOutput(text, isError, isOk) {
        var el = document.getElementById("output");
        var span = document.createElement("span");
        span.className = isError ? "err" : (isOk ? "ok" : "");
        span.textContent = text;
        el.appendChild(span);
        el.scrollTop = el.scrollHeight;
      }

      // ── File Panel ──
      document.getElementById("btn-toggle-files").addEventListener("click", function() {
        document.getElementById("file-panel").classList.toggle("hidden");
        setTimeout(function() { cm.refresh(); }, 50);
      });

      async function refreshFilePanel() {
        try {
          var r = await fetch(API + "/api/script/list");
          var j = await r.json();
          var list = document.getElementById("file-panel-list");
          var scripts = j.scripts || [];
          if (scripts.length === 0) {
            list.innerHTML = '<div class="fp-empty">No scripts yet.<br/>Create or load one above.</div>';
            return;
          }
          var html = scripts.map(function(name) {
            return '<div class="fp-item ' + (name === currentFile ? 'active' : '') + '" data-name="' + name + '">' +
              fileSVG + '<span class="fp-name">' + name + '</span>' +
              '<span class="fp-del" data-del="' + name + '" title="Delete">' + trashSVG + '</span></div>';
          }).join("");
          list.innerHTML = html;

          list.querySelectorAll(".fp-item").forEach(function(el) {
            el.addEventListener("click", async function(e) {
              if (e.target.closest(".fp-del")) return;
              var name = el.dataset.name;
              try {
                var r = await fetch(API + "/api/script/file?name=" + encodeURIComponent(name));
                var text = await r.text();
                cm.setValue(text);
                cm.clearHistory();
                currentFile = name;
                document.getElementById("sb-file").textContent = name;
                document.getElementById("file-status").textContent = "saved";
                document.getElementById("file-status").className = "file-status saved";
                document.getElementById("file-select").value = name;
                setEditorMode(name);
                refreshFilePanel();
              } catch(e) { appendOutput("Load failed: " + e.message + "\n", true); }
            });
          });

          list.querySelectorAll(".fp-del").forEach(function(el) {
            el.addEventListener("click", async function(e) {
              e.stopPropagation();
              var name = el.dataset.del;
              if (!confirm("Delete \"" + name + "\"?")) return;
              try {
                await fetch(API + "/api/script/file?name=" + encodeURIComponent(name), { method: "DELETE" });
                if (currentFile === name) {
                  currentFile = "";
                  cm.setValue("-- New Script\n\n");
                  document.getElementById("sb-file").textContent = "untitled.lua";
                }
                await loadFileList();
                refreshFilePanel();
              } catch(e) { appendOutput("Delete failed: " + e.message + "\n", true); }
            });
          });
        } catch(e) { console.error("refreshFilePanel", e); }
      }

      document.getElementById("btn-new-file").addEventListener("click", function() {
        currentFile = "";
        cm.setValue("-- New Script\n\n");
        document.getElementById("sb-file").textContent = "untitled.lua";
        document.getElementById("file-status").textContent = "unsaved";
        document.getElementById("file-status").className = "file-status";
        setEditorMode("");
        cm.focus();
        refreshFilePanel();
      });

      var origLoadFileList = loadFileList;
      loadFileList = async function() {
        await origLoadFileList();
        refreshFilePanel();
      };

      // ── Init ──
      loadFileList();

      if (window.location.hash) {
        var hashName = decodeURIComponent(window.location.hash.slice(1));
        if (hashName) {
          setTimeout(async function() {
            try {
              var r = await fetch(API + "/api/script/file?name=" + encodeURIComponent(hashName));
              if (r.ok) {
                var text = await r.text();
                cm.setValue(text);
                cm.clearHistory();
                currentFile = hashName;
                document.getElementById("sb-file").textContent = hashName;
                document.getElementById("file-status").textContent = "saved";
                document.getElementById("file-status").className = "file-status saved";
                setEditorMode(hashName);
              }
            } catch (e) { console.error("Auto-load from hash failed:", e); }
          }, 500);
        }
      }

      // Expose runScript globally
      window.runScript = runScript;

      // Lucide init
      if (typeof lucide !== "undefined") {
        lucide.createIcons();
      }
    </script>
  </body>
</html>
