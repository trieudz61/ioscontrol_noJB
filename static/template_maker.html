<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Template Maker — IOSControl</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
<style>
  :root { --bg:#0c0c14; --surface:#13131f; --surface2:#191930; --accent:#6c63ff; --accent-dim:rgba(108,99,255,0.15); --text:#e8e8f0; --sub:#8888a0; --muted:#55556a; --border:rgba(255,255,255,0.06); --green:#4caf50; --red:#ef5350; --radius:10px; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',-apple-system,sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

  /* Topbar */
  .topbar { display:flex; align-items:center; gap:10px; padding:10px 16px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
  .topbar h1 { font-size:15px; font-weight:600; display:flex; align-items:center; gap:6px; }
  .topbar h1 .material-icons { font-size:20px; color:var(--accent); }
  .sep { flex:1; }
  .btn { padding:7px 14px; border-radius:var(--radius); border:none; cursor:pointer; font-size:12px; font-weight:500; transition:all 0.15s; display:flex; align-items:center; gap:5px; }
  .btn:active { opacity:0.7; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { box-shadow:0 2px 12px rgba(108,99,255,0.3); }
  .btn-sec { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-sec:hover { background:rgba(255,255,255,0.05); }
  .btn-danger { background:rgba(239,83,80,0.15); color:var(--red); border:1px solid rgba(239,83,80,0.2); }
  .btn .material-icons { font-size:16px; }

  /* Layout */
  .main { display:flex; flex:1; overflow:hidden; }
  .canvas-wrap { flex:1; position:relative; overflow:hidden; background:#050510; display:flex; align-items:center; justify-content:center; }
  #screen-canvas { image-rendering:auto; cursor:crosshair; touch-action:none; max-width:100%; max-height:100%; display:block; }
  #sel-rect { position:absolute; border:2px solid var(--accent); background:rgba(108,99,255,0.12); pointer-events:none; display:none; border-radius:2px; }
  #sel-size { position:absolute; background:var(--accent); color:#fff; font-size:10px; padding:2px 6px; border-radius:4px; pointer-events:none; display:none; font-weight:500; }

  /* Panel */
  .panel { width:280px; background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
  .panel-section { padding:14px 16px; border-bottom:1px solid var(--border); }
  .panel-section h3 { font-size:10px; text-transform:uppercase; color:var(--muted); letter-spacing:0.8px; margin-bottom:10px; font-weight:600; }
  .input-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .input-row label { font-size:12px; color:var(--sub); min-width:40px; }
  .input-row input[type=text] { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); padding:7px 10px; font-size:13px; outline:none; transition:border-color 0.2s; }
  .input-row input:focus { border-color:var(--accent); }

  /* Region info */
  .region-info { font-family:monospace; font-size:11px; color:var(--sub); padding:4px 0; }

  /* Template list */
  .template-list { flex:1; overflow-y:auto; padding:8px; }
  .template-item { display:flex; align-items:center; gap:10px; padding:8px 10px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:6px; transition:border-color 0.15s; }
  .template-item:hover { border-color:rgba(108,99,255,0.3); }
  .tpl-info { flex:1; min-width:0; }
  .tpl-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tpl-path { font-size:10px; color:var(--muted); font-family:monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tpl-actions { display:flex; gap:4px; }
  .tpl-btn { width:28px; height:28px; border-radius:6px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
  .tpl-btn .material-icons { font-size:16px; }
  .tpl-btn.copy { background:var(--accent-dim); color:var(--accent); }
  .tpl-btn.copy:hover { background:rgba(108,99,255,0.25); }
  .tpl-btn.del { background:rgba(239,83,80,0.1); color:var(--red); }
  .tpl-btn.del:hover { background:rgba(239,83,80,0.2); }

  /* Empty state */
  .empty-state { text-align:center; padding:40px 16px; color:var(--muted); }
  .empty-state .material-icons { font-size:36px; margin-bottom:8px; display:block; }
  .empty-state p { font-size:12px; }

  /* Toast */
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px); padding:8px 20px; background:var(--accent); color:#fff; border-radius:20px; font-size:12px; font-weight:500; box-shadow:0 4px 16px rgba(108,99,255,0.4); transition:transform 0.3s, opacity 0.3s; opacity:0; z-index:100; pointer-events:none; }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }
</style>
</head>
<body>

<div class="topbar">
  <h1><i class="material-icons">crop</i> Template Maker</h1>
  <div class="sep"></div>
  <button class="btn btn-sec" id="btn-capture"><i class="material-icons">photo_camera</i> Capture</button>
  <button class="btn btn-primary" id="btn-save"><i class="material-icons">save</i> Save Template</button>
</div>

<div class="main">
  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="screen-canvas"></canvas>
    <div id="sel-rect"></div>
    <div id="sel-size"></div>
  </div>

  <div class="panel">
    <div class="panel-section">
      <h3>Template Name</h3>
      <div class="input-row">
        <input type="text" id="tpl-name" placeholder="e.g. buy_button" autocomplete="off" />
      </div>
    </div>

    <div class="panel-section">
      <h3>Selected Region</h3>
      <div class="region-info" id="region-info">No selection — drag on screen to select</div>
    </div>

    <div class="panel-section" style="border-bottom:none; padding-bottom:6px;">
      <h3>Saved Templates</h3>
    </div>
    <div class="template-list" id="template-list">
      <div class="empty-state" id="empty-state">
        <i class="material-icons">photo_library</i>
        <p>No templates yet.<br>Capture → Select → Save</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Saved!</div>

<script>
const PORT = location.port || 46952;
const API = `http://${location.hostname}:${PORT}`;
const canvas = document.getElementById('screen-canvas');
const ctx = canvas.getContext('2d');
let img = null;
let selBox = null;
let selStart = null;
let isDragging = false;

// ── Capture ──
async function capture() {
  try {
    const r = await fetch(`${API}/api/screen?quality=95`);
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); drawCanvas(); };
    img.src = url;
  } catch(e) {
    showToast('Capture failed — check connection');
  }
}

function drawCanvas() {
  if (!img) return;
  const wrap = document.getElementById('canvas-wrap');
  const scale = Math.min(wrap.clientWidth / img.width, wrap.clientHeight / img.height);
  canvas.width = img.width;
  canvas.height = img.height;
  canvas.style.width = Math.floor(img.width * scale) + 'px';
  canvas.style.height = Math.floor(img.height * scale) + 'px';
  ctx.drawImage(img, 0, 0);
  if (selBox) drawSelection();
}

function canvasToImg(ex, ey) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: Math.round((ex - rect.left) * canvas.width / rect.width),
    y: Math.round((ey - rect.top) * canvas.height / rect.height)
  };
}

// ── Drag selection ──
canvas.addEventListener('mousedown', e => {
  isDragging = true;
  selStart = canvasToImg(e.clientX, e.clientY);
  selBox = null;
  document.getElementById('sel-rect').style.display = 'none';
  document.getElementById('sel-size').style.display = 'none';
});

canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const cur = canvasToImg(e.clientX, e.clientY);
  selBox = {
    x: Math.min(selStart.x, cur.x),
    y: Math.min(selStart.y, cur.y),
    w: Math.abs(cur.x - selStart.x),
    h: Math.abs(cur.y - selStart.y)
  };
  drawCanvas();
  updateRegionInfo();
});

canvas.addEventListener('mouseup', () => {
  isDragging = false;
  if (selBox && selBox.w > 2 && selBox.h > 2) {
    updateRegionInfo();
  } else {
    selBox = null;
  }
});

function drawSelection() {
  if (!selBox) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = rect.width / canvas.width;
  const scaleY = rect.height / canvas.height;
  const wrap = document.getElementById('canvas-wrap');
  const wr = wrap.getBoundingClientRect();
  const sr = canvas.getBoundingClientRect();

  const el = document.getElementById('sel-rect');
  el.style.display = 'block';
  el.style.left = (sr.left - wr.left + selBox.x * scaleX) + 'px';
  el.style.top = (sr.top - wr.top + selBox.y * scaleY) + 'px';
  el.style.width = (selBox.w * scaleX) + 'px';
  el.style.height = (selBox.h * scaleY) + 'px';

  const sz = document.getElementById('sel-size');
  sz.style.display = 'block';
  sz.textContent = `${selBox.w} × ${selBox.h}`;
  sz.style.left = (sr.left - wr.left + selBox.x * scaleX) + 'px';
  sz.style.top = (sr.top - wr.top + selBox.y * scaleY - 20) + 'px';
}

function updateRegionInfo() {
  const el = document.getElementById('region-info');
  if (!selBox) {
    el.textContent = 'No selection — drag on screen to select';
    return;
  }
  el.textContent = `x=${selBox.x} y=${selBox.y} ${selBox.w}×${selBox.h}`;
}

// ── Save template ──
async function saveTemplate() {
  if (!selBox || selBox.w < 2 || selBox.h < 2) {
    showToast('Select a region first');
    return;
  }
  const name = document.getElementById('tpl-name').value.trim();
  if (!name) {
    showToast('Enter a template name');
    document.getElementById('tpl-name').focus();
    return;
  }

  try {
    const r = await fetch(`${API}/api/screen/crop`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        x: selBox.x, y: selBox.y,
        w: selBox.w, h: selBox.h,
        name: name
      })
    });
    const data = await r.json();
    if (data.ok) {
      showToast(`Saved: ${data.path}`);
      document.getElementById('tpl-name').value = '';
      loadTemplates();
    } else {
      showToast('Save failed: ' + (data.error || 'unknown'));
    }
  } catch (e) {
    showToast('Save failed: ' + e.message);
  }
}

// ── Load template list ──
async function loadTemplates() {
  try {
    const r = await fetch(`${API}/api/templates`);
    const items = await r.json();
    const list = document.getElementById('template-list');
    const empty = document.getElementById('empty-state');

    if (!items || items.length === 0) {
      list.innerHTML = '';
      list.appendChild(empty);
      empty.style.display = '';
      return;
    }

    list.innerHTML = items.map(t => `
      <div class="template-item">
        <div class="tpl-info">
          <div class="tpl-name">${t.name}</div>
          <div class="tpl-path">${t.path}</div>
        </div>
        <div class="tpl-actions">
          <button class="tpl-btn copy" title="Copy path" onclick="copyPath('${t.path}')">
            <i class="material-icons">content_copy</i>
          </button>
          <button class="tpl-btn del" title="Delete" onclick="deleteTpl('${t.name}')">
            <i class="material-icons">delete</i>
          </button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    console.error('Failed to load templates:', e);
  }
}

function copyPath(path) {
  try {
    var ta = document.createElement('textarea');
    ta.value = path;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  } catch(e) {}
  showToast('Copied: ' + path);
}

async function deleteTpl(name) {
  try {
    await fetch(`${API}/api/templates?name=${encodeURIComponent(name)}`, {method:'DELETE'});
    showToast('Deleted: ' + name);
    loadTemplates();
  } catch(e) {
    showToast('Delete failed');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Events ──
document.getElementById('btn-capture').addEventListener('click', capture);
document.getElementById('btn-save').addEventListener('click', saveTemplate);
document.getElementById('tpl-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveTemplate();
});
window.addEventListener('resize', drawCanvas);

// ── Init ──
capture();
loadTemplates();
</script>
</body>
</html>
